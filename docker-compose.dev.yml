services:
  # Backend API (Dev Mode)
  api:
    build:
      target: dev
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379
      # Allow requests from local frontend
      - CORS_ALLOWED_ORIGIN=http://localhost:5173
      # Host/Port for internal binding
      - HOST=0.0.0.0
      - PORT=8000
      # Dev Secrets (override .env if present)
      - JWT_SECRET=dev_jwt_secret_12345_local_only
      - COOKIE_SECRET=dev_cookie_secret_12345_local_only
      - TOKEN_SIGNING_SECRET=dev_token_secret_12345_local_only
      - OTP_PEPPER=dev_otp_pepper_12345_local_only
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # Frontend Web (Dev Mode)
  web:
    build:
      target: dev
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  # Disable Caddy for local dev to access services directly
  # (Optional: you can keep it if you want to test routing, but mapped ports above allow direct access)
  caddy:
    restart: no

  # DB Management (Dev Mode Only)
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  pgadmin-data:
